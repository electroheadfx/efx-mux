<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSD MUX</title>

  <!--
    Import map MUST appear before any <script type="module"> tags.
    Per D-11: inline importmap in index.html, no external .json file.
    Per RESEARCH Pitfall 2: placing this after module scripts causes
    "Bare specifier not in import map" runtime errors.
  -->
  <script type="importmap">
  {
    "imports": {
      "@arrow-js/core": "/vendor/arrow.js",
      "@xterm/xterm": "/vendor/xterm.mjs",
      "@xterm/addon-webgl": "/vendor/addon-webgl.mjs",
      "@xterm/addon-fit": "/vendor/addon-fit.mjs"
    }
  }
  </script>

  <link rel="stylesheet" href="/styles/theme.css" />
  <link rel="stylesheet" href="/styles/layout.css" />
  <link rel="stylesheet" href="/vendor/xterm.css" />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
